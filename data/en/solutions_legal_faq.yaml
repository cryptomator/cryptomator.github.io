- Question: "Why do law firms use Cryptomator?"
  Answer: "Law firms handle case files, contracts, and privileged communication that must stay confidential. Cryptomator encrypts these documents before they reach the cloud, so they remain protected even if a cloud account is breached or a laptop is lost."
- Question: "Does Cryptomator help protect attorney-client privilege?"
  Answer: "It helps. Because documents are encrypted on the device with zero-knowledge encryption, neither the cloud provider nor anyone without access can read privileged material. This supports your duty of confidentiality while still letting you use cloud storage."
- Question: "Can we separate access by client or matter?"
  Answer: "You can. With [Cryptomator Hub](/for-teams/) you create a vault per client or matter and grant access per person or group. Each lawyer or paralegal sees only the matters they work on, and access can be revoked at any time."
- Question: "Can we share documents securely with clients and co-counsel?"
  Answer: "Put the documents for a matter in a dedicated vault and share that vault with a client, co-counsel, or expert. You can revoke access when the matter ends, and the files stay encrypted in the cloud throughout."
- Question: "Does it support GDPR and professional confidentiality rules?"
  Answer: "It does. Encrypting personal and case data on the device keeps it unreadable to third parties, which supports both GDPR and professional confidentiality obligations. Access to each vault is logged for documentation."
- Question: "Does Cryptomator work with our existing document storage?"
  Answer: "Yes. Cryptomator runs on top of OneDrive, Google Drive, Nextcloud, S3, and local or on-premise servers, so you can add encryption without migrating your document management."
