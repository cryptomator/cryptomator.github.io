- Question: "Is Cryptomator HIPAA-compliant?"
  Answer: "Cryptomator provides the encryption that HIPAA expects for protected health information: files are encrypted on the device with AES-256 before they reach the cloud. Compliance always depends on your full setup, but client-side, zero-knowledge encryption is a strong technical safeguard for ePHI."
- Question: "Can Cryptomator protect patient records stored in the cloud?"
  Answer: "Yes. Patient records, lab results, and medical images are encrypted before upload, so the cloud provider and anyone without access cannot read them. This keeps health data confidential even if a cloud account is compromised."
- Question: "Does it support GDPR requirements for health data?"
  Answer: "It supports them. Encrypting personal health data on the device keeps it unreadable to third parties, which helps with the GDPR's requirements for protecting special categories of data. Access to each vault is logged so you can document who could open it."
- Question: "Can clinics control which staff can open which records?"
  Answer: "Yes. With [Cryptomator Hub](/for-teams/) you assign vault access per person or group, for example per ward, practice, or study, and revoke it at any time. Every access change is traceable."
- Question: "Does Cryptomator work with the cloud and systems we already use?"
  Answer: "Yes. Cryptomator runs on top of OneDrive, Google Drive, Nextcloud, S3, and local or on-premise servers, so you can add encryption without replacing your existing infrastructure."
- Question: "What encryption does Cryptomator use for medical data?"
  Answer: "Cryptomator uses AES with a 256-bit key length, and filenames are encrypted as well. The encryption is open source and can be independently audited; details are in the [security architecture](https://docs.cryptomator.org/security/architecture/)."
