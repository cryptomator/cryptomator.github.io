- Question: "Why do NGOs use Cryptomator?"
  Answer: "NGOs handle donor records, beneficiary data, and field reports that must stay confidential, often across borders and unreliable networks. Cryptomator encrypts these files before they reach the cloud, so the data stays protected even if an account or provider is compromised."
- Question: "Can Cryptomator protect beneficiary and donor data in the cloud?"
  Answer: "Yes. Files are encrypted on the device with zero-knowledge encryption, meaning the cloud provider and anyone without the password cannot read them. This keeps donor databases and beneficiary records private while still allowing your team to work with them."
- Question: "Does Cryptomator work for field teams with limited connectivity?"
  Answer: "Yes. Encrypted vaults are available offline, so field staff can open and edit files without a constant connection. Changes sync securely once the device is back online, and a lost or stolen device does not expose the data."
- Question: "Can we share encrypted data with partners and auditors?"
  Answer: "Yes. With [Cryptomator Hub](/for-teams/) you grant vault access to internal teams, funders, partners, or external auditors per person or group, and revoke it at any time. Every access change is traceable."
- Question: "Is Cryptomator affordable for non-profits?"
  Answer: "Cryptomator is open source, and the desktop app is free to use. Full access on Android and iOS is part of a paid plan. For centrally managed team access, [Cryptomator Hub](/for-teams/) is a separate paid product; reach out through [contact sales](/contact-sales/) to discuss options for non-profit organizations."
- Question: "Is the encryption independent of any single cloud provider?"
  Answer: "Yes. Cryptomator is cloud-independent and works with OneDrive, Google Drive, Nextcloud, ownCloud, S3, and local servers. Because it is [open source](/open-source/), the encryption can be independently audited."
