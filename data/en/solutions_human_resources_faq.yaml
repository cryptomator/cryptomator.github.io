- Question: "Why should HR teams encrypt employee data?"
  Answer: "Personnel files, payroll data, and applicant records are among the most sensitive data a company holds. Cryptomator encrypts these files before they reach the cloud, so they stay confidential even if a cloud account is breached or a device is lost."
- Question: "Does Cryptomator help with GDPR for employee data?"
  Answer: "It does. Encrypting employee data on the device keeps it unreadable to the cloud provider and unauthorized people, which supports the GDPR's requirements for protecting personal data. Access to each vault is logged so you can document who could open it."
- Question: "Can we limit access so only HR can open personnel files?"
  Answer: "Yes. With [Cryptomator Hub](/for-teams/) you grant vault access per person or group, so HR, finance, and managers each see only what concerns them. Permissions can be revoked at any time and every change is traceable."
- Question: "Can we share documents with an external payroll provider securely?"
  Answer: "Put the relevant documents in a dedicated vault and share that vault with the provider, auditor, or legal advisor. When the work is done, you revoke that access without touching your other vaults."
- Question: "Does it work with the HR and cloud tools we already use?"
  Answer: "It works with all of them. Cryptomator runs on top of OneDrive, Google Drive, Nextcloud, S3, and local servers, so you keep your current storage and add encryption on top of it."
- Question: "What happens to access when an employee leaves?"
  Answer: "You revoke their vault access in [Cryptomator Hub](/for-teams/), and they can no longer open the files. Because access is managed centrally, offboarding stays clean and auditable."
