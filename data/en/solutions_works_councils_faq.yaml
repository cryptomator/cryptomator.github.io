- Question: "Why do works councils need their own encryption?"
  Answer: "Works councils handle grievance cases, negotiation positions, and employee data that must stay independent from the employer. Cryptomator encrypts these files on the device, so council data stays confidential even when it is stored on company systems."
- Question: "Can the employer's IT department read works council data?"
  Answer: "No. With zero-knowledge encryption, files are unreadable to anyone without access, including administrators on the company's own cloud or servers. Only the council members you grant access to can open the vaults."
- Question: "Where can a works council store its encrypted files?"
  Answer: "Wherever it already has storage. Cryptomator works on top of OneDrive, Google Drive, Nextcloud, S3, and local servers, so the council can use existing infrastructure while keeping the contents private."
- Question: "Can we control which members can open which documents?"
  Answer: "Yes. With [Cryptomator Hub](/for-teams/) you grant vault access per member or committee, for example a separate vault per case or for negotiation documents. Access can be revoked and handed over between terms."
- Question: "Can we share documents with a labor lawyer or union securely?"
  Answer: "Yes. You can share a vault scoped to a single topic with a lawyer, union representative, or expert, and revoke it afterwards, without exposing the rest of the council's archive."
- Question: "Does this support data protection obligations for employee data?"
  Answer: "Yes. Encrypting employee and case data on the device keeps it unreadable to third parties, which supports the council's GDPR duties. Access to each vault is logged so handling stays documented."
