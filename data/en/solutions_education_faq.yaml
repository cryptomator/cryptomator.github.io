- Question: "Is Cryptomator suitable for schools and universities?"
  Answer: "Yes. Cryptomator encrypts student records, research data, and administrative files before they reach the cloud, so schools, universities, and research institutes keep full control over sensitive data. Teams can manage shared access centrally through [Cryptomator Hub](/for-teams/)."
- Question: "Does Cryptomator help with GDPR compliance for student data?"
  Answer: "It supports it. Because files are encrypted on the device before upload, personal data stays unreadable to the cloud provider and anyone without access. This zero-knowledge approach is a practical building block for GDPR-compliant handling of student and research data."
- Question: "Where is the encrypted data stored?"
  Answer: "Wherever you already store it. Cryptomator works on top of OneDrive, Google Drive, Nextcloud, S3, and local or institutional servers, so you don't have to migrate to a new platform to add encryption."
- Question: "Can faculty and research teams share encrypted files securely?"
  Answer: "They can. With Cryptomator Hub you grant vault access per person or group, for example a department, examination office, or external project partner. Every change to access is logged, so you can see who can open which vault."
- Question: "Is Cryptomator free for educational use?"
  Answer: "Cryptomator is open source, and the desktop app for Windows, macOS, and Linux is free. Full access on Android and iOS is available through a paid plan. For centrally managed access across staff and faculty, [Cryptomator Hub](/for-teams/) is a separate paid product with [pricing](/pricing/) for organizations."
- Question: "What happens if a staff member loses access to their account?"
  Answer: "With Cryptomator Hub, vault access is tied to each user's account rather than a shared vault password, and Cryptomator never stores passwords or keys in readable form. If someone loses access to their account, a vault owner can grant it again. Each vault also has its own recovery key that can restore it in an emergency. See the [security architecture](https://docs.cryptomator.org/security/architecture/) for details."
