- Question: "Warum nutzen NGOs Cryptomator?"
  Answer: "NGOs arbeiten mit Spenderdaten, Begünstigtendaten und Feldberichten, die vertraulich bleiben müssen, oft grenzüberschreitend und über unzuverlässige Netze. Cryptomator verschlüsselt diese Dateien, bevor sie in die Cloud gelangen, sodass die Daten auch bei einem kompromittierten Konto oder Anbieter geschützt bleiben."
- Question: "Kann Cryptomator Begünstigten- und Spenderdaten in der Cloud schützen?"
  Answer: "Das kann es. Dateien werden mit Zero-Knowledge-Verschlüsselung auf dem Gerät verschlüsselt. Der Cloud-Anbieter und alle ohne Passwort können sie nicht lesen. So bleiben Spenderdatenbanken und Begünstigtenakten privat, während dein Team weiter damit arbeiten kann."
- Question: "Funktioniert Cryptomator für Feldteams mit eingeschränkter Verbindung?"
  Answer: "Ja. Bereits auf ein Gerät synchronisierte Dateien lassen sich offline öffnen, da Cryptomator sie lokal entschlüsselt; wie viel ohne Verbindung verfügbar ist, hängt davon ab, was dein Cloud-Client zwischengespeichert hat. Änderungen werden synchronisiert, sobald das Gerät wieder online ist, und ein verlorenes oder gestohlenes Gerät gibt die Daten nicht preis."
- Question: "Können wir verschlüsselte Daten mit Partnern und Prüfstellen teilen?"
  Answer: "Das geht. Mit [Cryptomator Hub](/for-teams/) gibst du internen Teams, Geldgebern, Partnern oder externen Prüfstellen Zugriff auf Vaults, pro Person oder Gruppe und jederzeit widerrufbar. Jede Änderung am Zugriff ist nachvollziehbar."
- Question: "Ist Cryptomator für gemeinnützige Organisationen erschwinglich?"
  Answer: "Cryptomator ist Open Source, und die Desktop-App ist kostenlos nutzbar. Der volle Zugriff auf Android und iOS ist Teil eines kostenpflichtigen Plans. Für die zentrale Verwaltung von Teamzugriffen ist [Cryptomator Hub](/for-teams/) ein separates kostenpflichtiges Produkt. Über [Kontakt zum Vertrieb](/contact-sales/) besprechen wir gern Optionen für gemeinnützige Organisationen."
- Question: "Ist die Verschlüsselung unabhängig von einem einzelnen Cloud-Anbieter?"
  Answer: "Ist es. Cryptomator ist cloud-unabhängig und funktioniert mit OneDrive, Google Drive, Nextcloud, ownCloud, S3 und lokalen Servern. Da es [Open Source](/open-source/) ist, lässt sich die Verschlüsselung unabhängig überprüfen."
