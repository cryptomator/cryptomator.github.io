- Question: "Warum sollten HR-Teams Mitarbeiterdaten verschlüsseln?"
  Answer: "Personalakten, Gehaltsdaten und Bewerbungsunterlagen zählen zu den sensibelsten Daten eines Unternehmens. Cryptomator verschlüsselt diese Dateien, bevor sie in die Cloud gelangen, sodass sie selbst bei einem kompromittierten Konto oder verlorenen Gerät vertraulich bleiben."
- Question: "Unterstützt Cryptomator die DSGVO bei Mitarbeiterdaten?"
  Answer: "Ja. Die Verschlüsselung von Mitarbeiterdaten auf dem Gerät hält sie für den Cloud-Anbieter und Unbefugte unlesbar und unterstützt die DSGVO-Anforderungen zum Schutz personenbezogener Daten. Der Zugriff auf jeden Vault wird protokolliert."
- Question: "Können wir den Zugriff so begrenzen, dass nur HR Personalakten öffnet?"
  Answer: "Ja. Mit [Cryptomator Hub](/for-teams/) vergibst du Vault-Zugriff pro Person oder Gruppe, sodass HR, Finanzen und Führungskräfte jeweils nur das Relevante sehen. Berechtigungen lassen sich jederzeit entziehen und jede Änderung ist nachvollziehbar."
- Question: "Können wir Dokumente sicher mit einem externen Lohnbüro teilen?"
  Answer: "Ja. Du kannst einen geteilten Vault für ein bestimmtes Lohnbüro, eine Prüfstelle oder Rechtsberatung anlegen und nur diese Dateien freigeben. Nach Abschluss entziehst du den Zugriff, ohne den übrigen Aktenbestand zu berühren."
- Question: "Funktioniert es mit den HR- und Cloud-Tools, die wir bereits nutzen?"
  Answer: "Ja. Cryptomator arbeitet auf OneDrive, Google Drive, Nextcloud, S3 und lokalen Servern. Du behältst deinen bisherigen Speicher und ergänzt die Verschlüsselung darauf."
- Question: "Was passiert mit dem Zugriff, wenn jemand das Unternehmen verlässt?"
  Answer: "Du entziehst den Vault-Zugriff in [Cryptomator Hub](/for-teams/), und die Person kann die Dateien nicht mehr öffnen. Da der Zugriff zentral verwaltet wird, bleibt das Offboarding sauber und nachvollziehbar."
