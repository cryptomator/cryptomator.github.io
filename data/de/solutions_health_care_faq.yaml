- Question: "Ist Cryptomator HIPAA-konform?"
  Answer: "Cryptomator liefert die Verschlüsselung, die HIPAA für geschützte Gesundheitsdaten erwartet: Dateien werden auf dem Gerät mit AES-256 verschlüsselt, bevor sie in die Cloud gelangen. Compliance hängt immer vom Gesamtaufbau ab, doch clientseitige Zero-Knowledge-Verschlüsselung ist eine starke technische Schutzmaßnahme für ePHI."
- Question: "Kann Cryptomator Patientenakten in der Cloud schützen?"
  Answer: "Das kann es. Patientenakten, Laborergebnisse und Bilddaten werden vor dem Upload verschlüsselt, sodass der Cloud-Anbieter und Unbefugte sie nicht lesen können. Gesundheitsdaten bleiben damit vertraulich, selbst wenn ein Cloud-Konto kompromittiert wird."
- Question: "Unterstützt Cryptomator die DSGVO-Anforderungen für Gesundheitsdaten?"
  Answer: "Ja, es unterstützt sie. Die Verschlüsselung personenbezogener Gesundheitsdaten auf dem Gerät hält sie für Dritte unlesbar und hilft bei den DSGVO-Anforderungen zum Schutz besonderer Datenkategorien. Der Zugriff auf jeden Vault wird protokolliert."
- Question: "Können Kliniken steuern, welches Personal welche Akten öffnen darf?"
  Answer: "Ja. Mit [Cryptomator Hub](/for-teams/) vergibst du Zugriff auf Vaults pro Person oder Gruppe, etwa je Station, Praxis oder Studie, und entziehst ihn jederzeit. Jede Änderung am Zugriff ist nachvollziehbar."
- Question: "Funktioniert Cryptomator mit unserer vorhandenen Cloud und Software?"
  Answer: "Das tut es. Cryptomator arbeitet auf OneDrive, Google Drive, Nextcloud, S3 sowie lokalen oder On-Premise-Servern. Du kannst Verschlüsselung ergänzen, ohne die bestehende Infrastruktur zu ersetzen."
- Question: "Welche Verschlüsselung nutzt Cryptomator für medizinische Daten?"
  Answer: "Cryptomator verwendet AES mit 256-Bit-Schlüssellänge und verschlüsselt auch Dateinamen. Die Verschlüsselung ist Open Source und unabhängig überprüfbar; Details stehen in der [Sicherheitsarchitektur](https://docs.cryptomator.org/security/architecture/)."
