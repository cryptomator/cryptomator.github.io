- Question: "Eignet sich Cryptomator für Schulen und Hochschulen?"
  Answer: "Ja. Cryptomator verschlüsselt Studierendenakten, Forschungsdaten und Verwaltungsunterlagen, bevor sie in die Cloud gelangen. Schulen, Hochschulen und Forschungseinrichtungen behalten so die volle Kontrolle über sensible Daten. Geteilte Zugriffe lassen sich zentral über [Cryptomator Hub](/for-teams/) verwalten."
- Question: "Unterstützt Cryptomator die DSGVO-Konformität bei Studierendendaten?"
  Answer: "Ja, es unterstützt sie. Da Dateien bereits auf dem Gerät verschlüsselt werden, bleiben personenbezogene Daten für den Cloud-Anbieter und Unbefugte unlesbar. Dieses Zero-Knowledge-Prinzip ist ein praktischer Baustein für die DSGVO-konforme Verarbeitung von Studierenden- und Forschungsdaten."
- Question: "Wo werden die verschlüsselten Daten gespeichert?"
  Answer: "Dort, wo du sie ohnehin speicherst. Cryptomator arbeitet auf OneDrive, Google Drive, Nextcloud, S3 sowie lokalen oder institutionellen Servern. Du musst also nicht auf eine neue Plattform wechseln, um Verschlüsselung zu ergänzen."
- Question: "Können Lehrstühle und Forschungsteams verschlüsselte Dateien sicher teilen?"
  Answer: "Ja. Mit Cryptomator Hub vergibst du Zugriff auf Vaults pro Person oder Gruppe, etwa für einen Fachbereich, ein Prüfungsamt oder externe Projektpartner:innen. Jede Änderung am Zugriff wird protokolliert, sodass nachvollziehbar bleibt, wer welchen Vault öffnen kann."
- Question: "Ist Cryptomator für den Bildungsbereich kostenlos?"
  Answer: "Die Cryptomator-Apps für Windows, macOS, Linux, Android und iOS sind kostenlos und Open Source. Für die zentrale Verwaltung von Zugriffen über Kollegium und Verwaltung hinweg ist [Cryptomator Hub](/for-teams/) ein kostenpflichtiges Produkt mit [Preisen](/pricing/) für Organisationen."
- Question: "Was passiert, wenn eine Mitarbeiterin oder ein Mitarbeiter das Vault-Passwort vergisst?"
  Answer: "Jeder Vault hat einen Wiederherstellungsschlüssel, mit dem sich der Zugriff bei vergessenem Passwort wiederherstellen lässt. Cryptomator speichert Passwörter nie selbst, daher ist die sichere Aufbewahrung des Wiederherstellungsschlüssels entscheidend. Details findest du in der [Sicherheitsarchitektur](https://docs.cryptomator.org/security/architecture/)."
