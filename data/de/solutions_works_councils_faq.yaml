- Question: "Warum brauchen Betriebsräte eine eigene Verschlüsselung?"
  Answer: "Betriebsräte arbeiten mit Beschwerdefällen, Verhandlungspositionen und Beschäftigtendaten, die unabhängig vom Arbeitgeber bleiben müssen. Cryptomator verschlüsselt diese Dateien auf dem Gerät, sodass Betriebsratsdaten vertraulich bleiben, selbst wenn sie auf Unternehmenssystemen liegen."
- Question: "Kann die IT-Abteilung des Arbeitgebers Betriebsratsdaten lesen?"
  Answer: "Nein. Mit Zero-Knowledge-Verschlüsselung sind Dateien für alle ohne Zugriff unlesbar, auch für Administrator:innen der unternehmenseigenen Cloud oder Server. Nur die Gremienmitglieder, denen du Zugriff gibst, können die Vaults öffnen."
- Question: "Wo kann ein Betriebsrat seine verschlüsselten Dateien speichern?"
  Answer: "Dort, wo bereits Speicher vorhanden ist. Cryptomator arbeitet auf OneDrive, Google Drive, Nextcloud, S3 und lokalen Servern, sodass der Betriebsrat die vorhandene Infrastruktur nutzen kann und die Inhalte trotzdem privat bleiben."
- Question: "Können wir steuern, welche Mitglieder welche Dokumente öffnen dürfen?"
  Answer: "Das geht. Mit [Cryptomator Hub](/for-teams/) vergibst du Vault-Zugriff pro Mitglied oder Ausschuss, etwa einen eigenen Vault je Fall oder für Verhandlungsunterlagen. Der Zugriff lässt sich entziehen und zwischen Amtszeiten übergeben."
- Question: "Können wir Dokumente sicher mit einer Fachanwältin oder Gewerkschaft teilen?"
  Answer: "Lege die betreffenden Dokumente in einen eigenen Vault und teile diesen mit Anwält:in, Gewerkschaftsvertretung oder Sachverständigen. Danach entziehst du den Zugriff wieder, ohne das übrige Archiv des Gremiums offenzulegen."
- Question: "Unterstützt das die Datenschutzpflichten bei Beschäftigtendaten?"
  Answer: "Das tut es. Die Verschlüsselung von Beschäftigten- und Falldaten auf dem Gerät hält sie für Dritte unlesbar und unterstützt die DSGVO-Pflichten des Gremiums. Der Zugriff auf jeden Vault wird protokolliert, sodass die Bearbeitung dokumentiert bleibt."
