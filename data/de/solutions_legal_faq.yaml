- Question: "Warum nutzen Kanzleien Cryptomator?"
  Answer: "Kanzleien arbeiten mit Mandatsakten, Verträgen und vertraulicher Kommunikation, die geschützt bleiben müssen. Cryptomator verschlüsselt diese Dokumente, bevor sie in die Cloud gelangen, sodass sie selbst bei einem kompromittierten Konto oder verlorenen Laptop vertraulich bleiben."
- Question: "Hilft Cryptomator beim Schutz der Verschwiegenheitspflicht?"
  Answer: "Das hilft. Da Dokumente mit Zero-Knowledge-Verschlüsselung auf dem Gerät verschlüsselt werden, können weder der Cloud-Anbieter noch Unbefugte vertrauliche Unterlagen lesen. Das unterstützt die anwaltliche Verschwiegenheitspflicht und erlaubt zugleich die Nutzung von Cloud-Speicher."
- Question: "Können wir den Zugriff je Mandant oder Mandat trennen?"
  Answer: "Das geht. Mit [Cryptomator Hub](/for-teams/) legst du je Mandant oder Mandat einen Vault an und vergibst Zugriff pro Person oder Gruppe. Jede:r sieht nur die Mandate, an denen gearbeitet wird, und der Zugriff lässt sich jederzeit entziehen."
- Question: "Können wir Dokumente sicher mit Mandanten und Kolleg:innen teilen?"
  Answer: "Lege die Dokumente eines Mandats in einen eigenen Vault und teile diesen Vault mit Mandant, beteiligter Kanzlei oder Gutachter:in. Den Zugriff entziehst du nach Abschluss, und die Dateien bleiben in der Cloud durchgehend verschlüsselt."
- Question: "Unterstützt es DSGVO und Verschwiegenheitspflichten?"
  Answer: "Das tut es. Die Verschlüsselung von Personen- und Falldaten auf dem Gerät hält sie für Dritte unlesbar und unterstützt sowohl die DSGVO als auch berufsrechtliche Verschwiegenheitspflichten. Der Zugriff auf jeden Vault wird zur Dokumentation protokolliert."
- Question: "Funktioniert Cryptomator mit unserer vorhandenen Dokumentenablage?"
  Answer: "Ja. Cryptomator arbeitet auf OneDrive, Google Drive, Nextcloud, S3 sowie lokalen oder On-Premise-Servern. Du kannst Verschlüsselung ergänzen, ohne dein Dokumentenmanagement zu migrieren."
